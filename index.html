<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Супер Маріо 2D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #5c94fc 0%, #1e5799 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            display: block;
            border: 4px solid #000;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%;
            height: auto;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        #gameOver button {
            font-size: 24px;
            padding: 15px 30px;
            background: #e52521;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        #gameOver button:hover {
            background: #ff3333;
        }
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        #startScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #e52521;
        }
        #startScreen button {
            font-size: 24px;
            padding: 15px 30px;
            background: #e52521;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        #startScreen button:hover {
            background: #ff3333;
        }
        .controls {
            margin-top: 20px;
            font-size: 16px;
            color: #aaa;
        }
        #touchControls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 1000;
        }
        .d-pad {
            display: flex;
            gap: 15px;
        }
        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            font-size: 28px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.5);
        }
        .action-buttons {
            display: flex;
            gap: 15px;
        }
        .action-btn {
            width: 90px;
            height: 70px;
            background: rgba(229, 37, 33, 0.5);
            border: 3px solid rgba(229, 37, 33, 0.7);
            border-radius: 10px;
            font-size: 16px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .action-btn:active {
            background: rgba(229, 37, 33, 0.7);
        }
        .sprint-btn {
            background: rgba(255, 215, 0, 0.5);
            border-color: rgba(255, 215, 0, 0.7);
        }
        .sprint-btn:active {
            background: rgba(255, 215, 0, 0.7);
        }
        @media (max-width: 768px) {
            #touchControls {
                display: flex;
            }
            #gameContainer {
                width: 100%;
                max-width: 100%;
            }
            canvas {
                width: 100%;
                height: auto;
            }
            #ui {
                font-size: 16px;
            }
            #startScreen h1, #gameOver h1 {
                font-size: 32px;
            }
            #startScreen button, #gameOver button {
                font-size: 18px;
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game" width="800" height="600"></canvas>
        <div id="ui">
            <div>Очки: <span id="score">0</span></div>
            <div>Монети: <span id="coins">0</span></div>
            <div>Життя: <span id="lives">3</span></div>
            <div>Рівень: <span id="level">1</span> / <span id="maxLevel">10</span></div>
        </div>
        <div id="startScreen">
            <h1>🍄 Супер Маріо 2D 🍄</h1>
            <button id="startBtn">▶️ Почати гру</button>
            <div class="controls">
                <p>⬅️➡️ - Рух</p>
                <p>⬆️ або Space - Стрибок</p>
                <p>Shift - Прискорення</p>
            </div>
        </div>
        <div id="gameOver">
            <h1 id="gameOverText">Гра закінчена!</h1>
            <p>Очки: <span id="finalScore">0</span></p>
            <button id="restartBtn">🔄 Грати знову</button>
        </div>
    </div>
    
    <div id="touchControls">
        <div class="d-pad">
            <div class="touch-btn left" data-key="ArrowLeft">⬅️</div>
            <div class="touch-btn right" data-key="ArrowRight">➡️</div>
        </div>
        <div class="action-buttons">
            <div class="action-btn" data-key=" ">Стрибок</div>
        </div>
    </div>

<script src="game.js"></script>
</body>
</html>
